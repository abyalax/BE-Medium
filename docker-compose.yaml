services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medium-sqlserver
    restart: no
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - storage_network

  nats:
    image: nats:latest
    container_name: medium-nats
    restart: no
    command:
      - "--http_port"
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - storage_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: medium_mailpit
    restart: no
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: "1000"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_USERNAME: "medium-mailpit"
      MP_SMTP_AUTH_PASSWORD: "medium-mailpit"
      MP_OUTGOING_HOST: "localhost"
      MP_OUTGOING_PORT: "1025"
      MP_OUTGOING_SECURE: "false"
      MP_DEFAULT_FROM_EMAIL: "medium@mail.com"
      MP_DEFAULT_FROM_NAME: "Medium"
    volumes:
      - mailpit_data:/var/lib/mailpit/data
    command:
      - "--smtp-auth-allow-insecure"
    networks:
      - storage_network

  minio:
    image: minio/minio:latest
    container_name: medium_minio_server
    restart: no
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
      MINIO_REGION: "us-east-1"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 5s
    networks:
      - storage_network

  minio_mc:
    image: minio/mc:latest
    container_name: medium_minio_mc
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;

      mc mb minio/avatars || true;
      mc mb minio/article-covers || true;
      mc mb minio/documents || true;

      mc anonymous set public minio/avatars || true;
      mc anonymous set public minio/article-covers || true;

      echo 'Buckets initialized successfully';
      "
    networks:
      - storage_network

  redis:
    image: redis:7-alpine
    container_name: medium_redis
    restart: no
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass redis_password
    networks:
      - storage_network

networks:
  storage_network:
    driver: bridge

volumes:
  sqlserver_data:
  minio_data:
  redis_data:
  mailpit_data: